[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["*"]
# Read access to the shared Go<->Solidity parity vectors (test/Parity.t.sol).
fs_permissions = [{access = "read", path = "test/testdata"}]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
